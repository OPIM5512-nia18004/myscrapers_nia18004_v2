name: Publish training artifacts

on:
  workflow_dispatch:
  schedule:
    - cron: '55 * * * *'

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ vars.PROJECT_ID }}
  REGION: ${{ vars.REGION }}
  TRAIN_FUNCTION_NAME: train-dt
  DEPLOYER_SA: ${{ vars.DEPLOYER_SA }}
  WORKLOAD_IDENTITY_PROVIDER: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Resolve train function URL
        id: train-url
        shell: bash
        run: |
          set -euo pipefail
          URL=$(gcloud functions describe "${TRAIN_FUNCTION_NAME}" --gen2 --region "${REGION}" --format='value(serviceConfig.uri)')
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Mint train function ID token
        id: auth-train
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}
          token_format: id_token
          id_token_audience: ${{ steps.train-url.outputs.url }}
          id_token_include_email: true

      - name: Trigger latest training run
        shell: bash
        run: |
          set -euo pipefail
          HTTP_CODE=$(curl -sS -o artifacts/train_response.json -w "%{http_code}" -X POST "${{ steps.train-url.outputs.url }}" \
            -H "Authorization: Bearer ${{ steps.auth-train.outputs.id_token }}" \
            -H "Content-Type: application/json" \
            -d '{"dry_run":false}')
          echo "train-dt HTTP status: ${HTTP_CODE}"
          cat artifacts/train_response.json
          echo
          if [[ "${HTTP_CODE}" != "200" && "${HTTP_CODE}" != "204" ]]; then
            echo "::error::train-dt invocation failed before artifact publish."
            exit 1
          fi

      - name: Download latest training artifact bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          HTTP_CODE=$(curl -sS -D artifacts/bundle_headers.txt -o artifacts/training_artifacts.zip -w "%{http_code}" -X POST "${{ steps.train-url.outputs.url }}" \
            -H "Authorization: Bearer ${{ steps.auth-train.outputs.id_token }}" \
            -H "Content-Type: application/json" \
            -d '{"download_latest_bundle":true}')
          echo "bundle HTTP status: ${HTTP_CODE}"
          cat artifacts/bundle_headers.txt
          if ! grep -qi '^content-type: application/zip' artifacts/bundle_headers.txt; then
            echo "::error::Expected a ZIP bundle but received a different response."
            echo "Response body:"
            cat artifacts/training_artifacts.zip || true
            exit 1
          fi
          unzip -o artifacts/training_artifacts.zip -d artifacts

      - name: Upload GitHub artifacts
        uses: actions/upload-artifact@v4
        with:
          name: training-artifacts
          path: artifacts/
