name: Publish training artifacts

on:
  workflow_dispatch:
  schedule:
    - cron: '55 * * * *'

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ vars.PROJECT_ID }}
  REGION: ${{ vars.REGION }}
  TRAIN_FUNCTION_NAME: train-dt
  DEPLOYER_SA: ${{ vars.DEPLOYER_SA }}
  WORKLOAD_IDENTITY_PROVIDER: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Resolve train function URL
        id: train-url
        shell: bash
        run: |
          set -euo pipefail
          URL=$(gcloud functions describe "${TRAIN_FUNCTION_NAME}" --gen2 --region "${REGION}" --format='value(serviceConfig.uri)')
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Mint train function ID token
        id: auth-train
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}
          token_format: id_token
          id_token_audience: ${{ steps.train-url.outputs.url }}
          id_token_include_email: true

      - name: Download latest training artifact bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          curl -sS -X POST "${{ steps.train-url.outputs.url }}" \
            -H "Authorization: Bearer ${{ steps.auth-train.outputs.id_token }}" \
            -H "Content-Type: application/json" \
            -d '{"download_latest_bundle":true}' \
            --output artifacts/training_artifacts.zip
          unzip -o artifacts/training_artifacts.zip -d artifacts

      - name: Upload GitHub artifacts
        uses: actions/upload-artifact@v4
        with:
          name: training-artifacts
          path: artifacts/
